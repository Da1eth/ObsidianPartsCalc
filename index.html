<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Obsidian Protocol Parts Calculator</title>
    <link rel="stylesheet" href="./src/styles.css?v=svg">
  </head>
  <body>
    <aside class="sidebar" id="sidebar" aria-label="보유 파츠" aria-hidden="true">
      <div class="sidebar-backdrop" id="sidebar-backdrop"></div>
      <div class="sidebar-panel">
        <button class="sidebar-close" id="sidebar-close" type="button" aria-label="보유 파츠 닫기">‹</button>
        <div class="sidebar-content">
          <section class="panel">
            <h2>팩션</h2>
            <div class="faction-tabs" id="faction-tabs"></div>
          </section>

          <section class="panel">
            <h2>박스</h2>
            <div id="box-list" class="stack"></div>
          </section>

          <section class="panel">
            <h2>남는 파츠</h2>
            <div id="leftover-parts" class="sprue-groups"></div>
          </section>

          <section class="sidebar-summary-panel">
            <div class="summary-stats" id="summary-stats"></div>
          </section>
        </div>
      </div>
    </aside>

    <div class="app-frame">
      <main class="app">
        <header class="app-header">
          <button class="sidebar-open" id="sidebar-open" type="button" aria-label="보유 파츠 열기">›</button>
          <div>
            <p class="eyebrow">Obsidian Protocol</p>
            <h1>파츠 계산기</h1>
          </div>
          <div class="header-actions">
            <button class="ghost-button" id="reset-builds" type="button">초기화</button>
            <button class="ghost-button" id="add-available-builds" type="button">전부 담기</button>
          </div>
        </header>

        <section class="workspace" id="workspace">
          <section class="panel build-controls">
            <div class="section-title-row">
              <h2>부품 검색</h2>
            </div>
            <div class="slot-tabs" id="slot-tabs"></div>
            <label class="search">
              <input id="build-search" type="search" placeholder="검색할 부품 이름을 입력하세요.">
            </label>
            <div id="build-list" class="build-list"></div>
          </section>

          <section class="dashboard" aria-label="결과">
            <section class="panel selected-panel">
              <div class="section-title-row">
                <h2>조립 계획</h2>
              </div>
              <div id="selected-builds" class="selected-builds"></div>
            </section>

            <section class="results" aria-label="부족 및 추천">
              <section class="panel warning-panel" id="shortage-panel">
                <h2>부족한 파츠</h2>
                <div id="shortage-parts" class="part-table"></div>
              </section>

              <section class="panel">
                <div class="section-title-row">
                  <h2>추가 조립 가능 부품</h2>
                </div>
                <div id="available-builds" class="available-list"></div>
              </section>
            </section>
          </section>
        </section>
      </main>
    </div>

    <script type="module" src="./src/app.js?v=svg"></script>
  </body>
</html>
